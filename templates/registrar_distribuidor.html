<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Distribuidor - Gimnasio</title>
<style>
body{font-family:Poppins;background:#1d2531;color:#fff;text-align:center;}
.container{width:60%;margin:auto;margin-top:40px;}
h1{color:#00c9a7;margin-bottom:30px;}
.form-group{margin:15px 0;text-align:left;}
label{display:block;margin-bottom:8px;color:#00c9a7;font-weight:bold;}
.required::after{content:" *";color:#f44336;}
input,select{
    width:100%;
    padding:10px;
    border:2px solid #00c9a7;
    border-radius:8px;
    background:#2d3748;
    color:#fff;
    font-size:14px;
}
input:focus,select:focus{
    outline:none;
    border-color:#ffa726;
    background:#374151;
}
.form-row{display:flex;gap:15px;}
.form-row .form-group{flex:1;}
.btn{
    padding:12px 30px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:10px;
    font-size:16px;
    transition:all 0.3s;
}
.btn:hover{transform:translateY(-2px);}
.btn-submit{background:#00c9a7;color:#000;font-weight:bold;}
.btn-submit:hover{background:#00b894;}
.btn-cancel{background:#6c757d;color:#fff;}
.btn-cancel:hover{background:#5a6268;}
.error{color:#f44336;margin:10px 0;padding:10px;background:#2d1b1b;border-radius:5px;}
.form-container{background:#2d3748;padding:30px;border-radius:10px;border:2px solid #00c9a7;}
.section-title{color:#ffa726;margin:25px 0 15px 0;border-bottom:1px solid #00c9a7;padding-bottom:8px;}
</style>
</head>
<body>
<h1>🚚 Registrar Nuevo Distribuidor</h1>

<div class="container">
    <div class="form-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="section-title">👤 Información del Distribuidor</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre" class="required">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" value="{{ nombre or '' }}" required 
                           placeholder="Ej: Roberto">
                </div>
                <div class="form-group">
                    <label for="apellido" class="required">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" value="{{ apellido or '' }}" required 
                           placeholder="Ej: Gonzales">
                </div>
            </div>

            <div class="form-group">
                <label for="telefono" class="required">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" value="{{ telefono or '' }}" required 
                       placeholder="Ej: 3108038760" pattern="[0-9]{10}" title="Ingresa 10 dígitos sin espacios">
            </div>

            <div class="section-title">📦 Información Comercial</div>

            <div class="form-group">
                <label for="categoria" class="required">Categoría de Productos:</label>
                <select id="categoria" name="categoria" required>
                    <option value="">Seleccione una categoría</option>
                    <option value="Alimentos" {% if categoria == 'Alimentos' %}selected{% endif %}>🍎 Alimentos y Bebidas</option>
                    <option value="Suplementos" {% if categoria == 'Suplementos' %}selected{% endif %}>💊 Suplementos Deportivos</option>
                    <option value="Maquinas" {% if categoria == 'Maquinas' %}selected{% endif %}>⚙️ Máquinas y Equipos</option>
                    <option value="Implementos" {% if categoria == 'Implementos' %}selected{% endif %}>🏋️ Implementos Deportivos</option>
                    <option value="Ropa" {% if categoria == 'Ropa' %}selected{% endif %}>👕 Ropa Deportiva</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit">💾 Registrar Distribuidor</button>
            <a href="/distribuidores" class="btn btn-cancel">❌ Cancelar</a>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Formatear automáticamente el teléfono
    const telefonoInput = document.getElementById('telefono');
    
    telefonoInput.addEventListener('input', function(e) {
        // Remover cualquier caracter que no sea número
        let value = e.target.value.replace(/\D/g, '');
        
        // Limitar a 10 dígitos
        if (value.length > 10) {
            value = value.substring(0, 10);
        }
        
        e.target.value = value;
    });
    
    // Validar que el teléfono tenga 10 dígitos al enviar
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        const telefono = telefonoInput.value;
        if (telefono.length !== 10) {
            e.preventDefault();
            alert('El número de teléfono debe tener exactamente 10 dígitos');
            telefonoInput.focus();
        }
    });
});
</script>
</body>
</html>
