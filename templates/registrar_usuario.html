<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Usuario - Gimnasio</title>
<style>
body{font-family:Poppins;background:#1d2531;color:#fff;text-align:center;}
.container{width:60%;margin:auto;margin-top:40px;}
h1{color:#00c9a7;margin-bottom:30px;}
.form-group{margin:15px 0;text-align:left;}
label{display:block;margin-bottom:8px;color:#00c9a7;font-weight:bold;}
.required::after{content:" *";color:#f44336;}
input,select{
    width:100%;
    padding:10px;
    border:2px solid #00c9a7;
    border-radius:8px;
    background:#2d3748;
    color:#fff;
    font-size:14px;
}
input:focus,select:focus{
    outline:none;
    border-color:#ffa726;
    background:#374151;
}
.form-row{display:flex;gap:15px;}
.form-row .form-group{flex:1;}
.btn{
    padding:12px 30px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:10px;
    font-size:16px;
    transition:all 0.3s;
}
.btn:hover{transform:translateY(-2px);}
.btn-submit{background:#00c9a7;color:#000;font-weight:bold;}
.btn-submit:hover{background:#00b894;}
.btn-cancel{background:#6c757d;color:#fff;}
.btn-cancel:hover{background:#5a6268;}
.error{color:#f44336;margin:10px 0;padding:10px;background:#2d1b1b;border-radius:5px;}
.form-container{background:#2d3748;padding:30px;border-radius:10px;border:2px solid #00c9a7;}
.section-title{color:#ffa726;margin:25px 0 15px 0;border-bottom:1px solid #00c9a7;padding-bottom:8px;}
.optional{font-size:12px;color:#6c757d;font-style:italic;}
</style>
</head>
<body>
<h1>👤 Registrar Nuevo Usuario</h1>

<div class="container">
    <div class="form-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="section-title">📋 Información Personal</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre" class="required">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" value="{{ nombre or '' }}" required 
                           placeholder="Ej: Carlos">
                </div>
                <div class="form-group">
                    <label for="apellido" class="required">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" value="{{ apellido or '' }}" required 
                           placeholder="Ej: Ramírez">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefono" class="required">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" value="{{ telefono or '' }}" required 
                           placeholder="Ej: 555-1234">
                </div>
                <div class="form-group">
                    <label for="edad" class="required">Edad:</label>
                    <input type="number" id="edad" name="edad" value="{{ edad or '' }}" 
                           min="16" max="75" required placeholder="16-75">
                </div>
            </div>

            <div class="form-group">
                <label for="direccion" class="required">Dirección:</label>
                <input type="text" id="direccion" name="direccion" value="{{ direccion or '' }}" required 
                       placeholder="Ej: Av. Los Pinos 123">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="seguro" class="required">Seguro Médico:</label>
                    <select id="seguro" name="seguro" required>
                        <option value="">Seleccione un seguro</option>
                        <option value="Mapfre" {% if seguro == 'Mapfre' %}selected{% endif %}>Mapfre</option>
                        <option value="Rimac" {% if seguro == 'Rimac' %}selected{% endif %}>Rimac</option>
                        <option value="Pacífico" {% if seguro == 'Pacífico' %}selected{% endif %}>Pacífico</option>
                        <option value="La Positiva" {% if seguro == 'La Positiva' %}selected{% endif %}>La Positiva</option>
                        <option value="Otro" {% if seguro == 'Otro' %}selected{% endif %}>Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fecha_registro" class="required">Fecha de Registro:</label>
                    <input type="date" id="fecha_registro" name="fecha_registro" value="{{ fecha_registro or '' }}" required>
                </div>
            </div>

            <div class="section-title">💳 Membresía (Opcional)</div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="plan_membresia">Plan de Membresía:</label>
                    <select id="plan_membresia" name="plan_membresia">
                        <option value="">Sin membresía</option>
                        <option value="Básico" {% if plan_membresia == 'Básico' %}selected{% endif %}>⭐ Básico ($50.00)</option>
                        <option value="Premium" {% if plan_membresia == 'Premium' %}selected{% endif %}>🌟 Premium ($120.00)</option>
                        <option value="Anual" {% if plan_membresia == 'Anual' %}selected{% endif %}>🏆 Anual ($200.00)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="duracion_membresia">Duración (meses):</label>
                    <input type="number" id="duracion_membresia" name="duracion_membresia" value="{{ duracion_membresia or '' }}" 
                           min="1" max="12" placeholder="1-12">
                </div>
            </div>

            <button type="submit" class="btn btn-submit">💾 Registrar Usuario</button>
            <a href="/usuarios" class="btn btn-cancel">❌ Cancelar</a>
        </form>
    </div>
</div>

<script>
    // Actualizar la fecha actual como valor por defecto
    document.addEventListener('DOMContentLoaded', function() {
        const fechaInput = document.getElementById('fecha_registro');
        if (!fechaInput.value) {
            const today = new Date().toISOString().split('T')[0];
            fechaInput.value = today;
        }
        
        // Mostrar/ocultar duración según selección de plan
        const planSelect = document.getElementById('plan_membresia');
        const duracionInput = document.getElementById('duracion_membresia');
        
        planSelect.addEventListener('change', function() {
            if (this.value) {
                duracionInput.required = true;
                // Establecer duración por defecto según el plan
                if (this.value === 'Básico') duracionInput.value = '3';
                else if (this.value === 'Premium') duracionInput.value = '6';
                else if (this.value === 'Anual') duracionInput.value = '12';
            } else {
                duracionInput.required = false;
                duracionInput.value = '';
            }
        });
    });
</script>
</body>
</html>
